version: '3.9'

services:

  backend:
    build:
      context: ./backend

    container_name: backend-api

    ports:
      - "5000:5000"

    environment:
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: microservicesdb

    depends_on:
      - postgres

  postgres:
    image: postgres:15

    container_name: postgres-db

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: microservicesdb

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: